<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <title>WasteLess</title>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="page-login" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center border">
            <h1 class="text-4xl font-black text-green-600 mb-2 italic">WasteLess</h1>
            <p class="text-slate-400 mb-8 text-sm">Circular Economy Connector</p>
            <input id="user-id" placeholder="Your Name" class="w-full p-4 border rounded-2xl mb-6 text-center focus:ring-2 focus:ring-green-500 outline-none">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="login('seller')" class="bg-white border-2 border-green-500 py-4 rounded-2xl font-bold hover:bg-green-50 transition">Seller</button>
                <button onclick="login('buyer')" class="bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition">Buyer</button>
            </div>
        </div>
    </div>

    <div id="page-seller" class="hidden min-h-screen p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold">Seller: <span id="display-seller-name" class="text-green-600"></span></h2>
            <button onclick="logout()" class="text-red-500 font-medium bg-red-50 px-4 py-2 rounded-lg">Logout</button>
        </div>
        
        <div class="grid lg:grid-cols-3 gap-10">
            <!-- Notifications Sidebar -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-3xl shadow-xl border">
                    <h3 class="text-xl font-bold mb-4 text-slate-700 flex items-center">
                        <span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-pulse"></span>
                        Live Notifications
                    </h3>
                    <div id="notifications-list" class="space-y-3 max-h-96 overflow-y-auto">
                        <p class="text-slate-400 italic text-sm">No new notifications</p>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-2 space-y-10">
                <div class="bg-white p-8 rounded-3xl shadow-xl border">
                    <h3 class="text-xl font-bold mb-6 text-slate-700">Drop New Item</h3>
                    <div class="space-y-4">
                        <input id="s-shop" placeholder="Shop Name" class="w-full p-3 border rounded-xl">
                        <input id="s-location" placeholder="Shop Location/Area" class="w-full p-3 border rounded-xl">
                        <input id="s-contact" placeholder="Shop Contact Number" class="w-full p-3 border rounded-xl">
                        <select id="s-category" class="w-full p-3 border rounded-xl bg-white">
                            <option value="">Select Category</option>
                            <option value="food">Food Items</option>
                            <option value="bakery">Bakery Items</option>
                            <option value="groceries">Groceries</option>
                            <option value="other">Other Products</option>
                        </select>
                        <input id="s-item" placeholder="Product Name" class="w-full p-3 border rounded-xl">
                        <input id="s-price" type="number" placeholder="WasteLess Price (₹)" class="w-full p-3 border rounded-xl">
                        <input id="s-deadline" placeholder="Pickup Deadline (e.g. 10 PM)" class="w-full p-3 border rounded-xl">
                        <button onclick="uploadProduct()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-700 shadow-lg shadow-green-200 transition">Post Listing</button>
                    </div>
                </div>

                <!-- Active Listings -->
                <div class="bg-white p-8 rounded-3xl shadow-xl border">
                    <h3 class="text-xl font-bold mb-6 text-slate-700">My Active Listings</h3>
                    <div id="seller-active-listings" class="space-y-4"></div>
                </div>

                <!-- Claimed Items -->
                <div class="bg-white p-8 rounded-3xl shadow-xl border">
                    <h3 class="text-xl font-bold mb-6 text-slate-700">Claimed Items (Orders)</h3>
                    <div id="seller-orders-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-buyer" class="hidden min-h-screen p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-black">Available Deals</h2>
            <button onclick="logout()" class="text-slate-400">Logout</button>
        </div>
        
        <!-- Category Filter -->
        <div class="mb-8">
            <div class="flex gap-4 flex-wrap">
                <button onclick="filterByCategory('all')" class="category-btn bg-green-600 text-white px-6 py-2 rounded-full font-bold transition">All Items</button>
                <button onclick="filterByCategory('food')" class="category-btn bg-white border-2 border-green-500 text-green-600 px-6 py-2 rounded-full font-bold hover:bg-green-50 transition">Food</button>
                <button onclick="filterByCategory('bakery')" class="category-btn bg-white border-2 border-green-500 text-green-600 px-6 py-2 rounded-full font-bold hover:bg-green-50 transition">Bakery</button>
                <button onclick="filterByCategory('groceries')" class="category-btn bg-white border-2 border-green-500 text-green-600 px-6 py-2 rounded-full font-bold hover:bg-green-50 transition">Groceries</button>
                <button onclick="filterByCategory('other')" class="category-btn bg-white border-2 border-green-500 text-green-600 px-6 py-2 rounded-full font-bold hover:bg-green-50 transition">Other</button>
            </div>
        </div>
        
        <div id="buyer-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <div id="page-details" class="hidden min-h-screen flex items-center justify-center p-6 bg-green-600">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full">
            <div class="text-center mb-8">
                <div class="text-6xl mb-4">✨</div>
                <h2 class="text-3xl font-black text-slate-800">Item Reserved!</h2>
            </div>
            <div id="final-details-box" class="bg-slate-50 p-6 rounded-3xl space-y-4 border-2 border-dashed border-slate-200"></div>
            <button onclick="showPage('page-buyer')" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg">Return to Market</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let role = null;
        let allItems = [];
        let currentFilter = 'all';
        let notifications = [];

        function login(userRole) {
            const id = document.getElementById('user-id').value;
            if(!id) return alert("Please enter your name");
            currentUser = id;
            role = userRole;
            
            if(role === 'seller') {
                document.getElementById('display-seller-name').innerText = currentUser;
                showPage('page-seller');
            } else {
                showPage('page-buyer');
            }
        }

        function logout() { location.reload(); }

        function showPage(id) {
            document.querySelectorAll('div[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'page-buyer') fetchBuyerItems();
            if(id === 'page-seller') { 
                fetchSellerActiveListings();
                fetchSellerOrders(); 
            }
        }

        // FIXED: Seller upload with notification
        async function uploadProduct() {
            const data = {
                sellerId: currentUser,
                shop: document.getElementById('s-shop').value,
                location: document.getElementById('s-location').value,
                contact: document.getElementById('s-contact').value,
                category: document.getElementById('s-category').value,
                item: document.getElementById('s-item').value,
                price: document.getElementById('s-price').value,
                deadline: document.getElementById('s-deadline').value
            };

            if(!data.item || !data.price || !data.category) return alert("Please fill Item, Price and Category");

            const response = await fetch('/api/add', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });
            const result = await response.json();
            
            alert(result.message || "✅ Listing Posted!");
            document.querySelectorAll('#page-seller input, #page-seller select').forEach(i => i.value = '');
            fetchSellerActiveListings();
            fetchSellerOrders();
        }

        // NEW: Active listings
        async function fetchSellerActiveListings() {
            const res = await fetch('/api/seller-active/' + currentUser);
            const items = await res.json();
            document.getElementById('seller-active-listings').innerHTML = 
                items.length ? items.map(i => `
                    <div class="p-4 bg-slate-50 rounded-xl border">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-lg">${i.item}</p>
                                <p class="text-sm text-slate-500">${i.shop} • ${i.location}</p>
                                <p class="text-sm text-slate-500">₹${i.price} • Until ${i.deadline}</p>
                                <span class="inline-block mt-2 px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">${i.category}</span>
                            </div>
                            <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-bold">Available</span>
                        </div>
                    </div>
                `).join('') : '<p class="text-slate-400 italic">No active listings</p>';
        }

        async function fetchSellerOrders() {
            const res = await fetch('/api/seller-orders/' + currentUser);
            const orders = await res.json();
            const container = document.getElementById('seller-orders-list');
            
            container.innerHTML = orders.length ? orders.map(o => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-green-500 flex justify-between items-center">
                    <div>
                        <p class="font-black text-lg text-slate-800">${o.item}</p>
                        <p class="text-sm text-slate-500">Buyer: <b>${o.buyerName}</b> (${o.buyerContact})</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs uppercase font-bold text-slate-400">Arrival</p>
                        <p class="font-bold text-green-600">${o.buyerTime}</p>
                    </div>
                </div>
            `).join('') : '<div class="text-center py-10 text-slate-400 italic">No orders yet.</div>';
        }

        async function fetchBuyerItems() {
            const res = await fetch('/api/items');
            allItems = await res.json();
            renderBuyerItems();
        }
        
        function filterByCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-green-600', 'text-white');
                btn.classList.add('bg-white', 'border-2', 'border-green-500', 'text-green-600');
            });
            event.target.classList.remove('bg-white', 'border-2', 'border-green-500', 'text-green-600');
            event.target.classList.add('bg-green-600', 'text-white');
            renderBuyerItems();
        }
        
        function renderBuyerItems() {
            const filteredItems = currentFilter === 'all' ? allItems : allItems.filter(i => i.category === currentFilter);
            
            document.getElementById('buyer-grid').innerHTML = filteredItems.map(i => `
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-2 border-transparent hover:border-green-500 transition-all group">
                    <div class="mb-3">
                        <span class="inline-block px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">${i.category}</span>
                    </div>
                    <h3 class="font-black text-2xl mb-1">${i.item}</h3>
                    <p class="text-slate-400 font-medium mb-2">${i.shop}</p>
                    <p class="text-sm text-slate-500 mb-4">📍 ${i.location}</p>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-xs font-bold text-red-500 uppercase tracking-widest">Until ${i.deadline}</p>
                            <p class="text-3xl font-black text-green-600">₹${i.price}</p>
                        </div>
                        ${i.soldOut === 1 ? 
                            `<span class="px-4 py-2 bg-red-100 text-red-700 rounded-full font-bold">Claimed</span>` :
                            `<button onclick='processClaim(${JSON.stringify(i)})' class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold group-hover:bg-green-600 transition">Claim</button>`
                        }
                    </div>
                </div>
            `).join('') || '<div class="col-span-full text-center py-20 text-slate-400">No deals available!</div>';
        }

        async function processClaim(item) {
            const bName = prompt("Enter your Name:");
            const bPhone = prompt("Enter your Contact Number:");
            const bTime = prompt("In how many minutes will you collect? (e.g., 20 mins):");
            if(!bName || !bPhone || !bTime) return;

            await fetch('/api/buy/' + item.id, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ buyerName: bName, buyerContact: bPhone, buyerTime: bTime })
            });

            document.getElementById('final-details-box').innerHTML = `
                <div class="flex justify-between border-b pb-2"><span>Item:</span><b>${item.item}</b></div>
                <div class="flex justify-between border-b pb-2"><span>Shop:</span><b>${item.shop}</b></div>
                <div class="flex justify-between border-b pb-2"><span>Location:</span><b>${item.location}</b></div>
                <div class="flex justify-between border-b pb-2"><span>Contact:</span><b>${item.contact}</b></div>
                <div class="flex justify-between border-b pb-2"><span>Deadline:</span><b>${item.deadline}</b></div>
                <div class="flex justify-between text-green-600 font-bold"><span>Your Arrival:</span><span>${bTime}</span></div>
                <div class="flex justify-between text-blue-600 font-bold"><span>Your Name:</span><span>${bName}</span></div>
                <div class="flex justify-between text-blue-600 font-bold"><span>Your Phone:</span><span>${bPhone}</span></div>
            `;
            showPage('page-details');
        }
        
        function addNotification(notification) {
            notifications.unshift(notification);
            if(notifications.length > 10) notifications.pop();
            renderNotifications();
        }
        
        function renderNotifications() {
            const container = document.getElementById('notifications-list');
            container.innerHTML = notifications.length ? notifications.map(n => `
                <div class="p-3 bg-green-50 border border-green-200 rounded-xl">
                    <p class="font-bold text-green-800">${n.item}</p>
                    <p class="text-sm text-green-600">Claimed by ${n.buyerName}</p>
                    <p class="text-xs text-slate-500">Contact: ${n.buyerContact} • Arrives: ${n.buyerTime}</p>
                </div>
            `).join('') : '<p class="text-slate-400 italic text-sm">No new notifications</p>';
        }

        socket.on('refresh', () => {
            if(role === 'buyer') fetchBuyerItems();
            if(role === 'seller') { 
                fetchSellerActiveListings(); 
                fetchSellerOrders(); 
            }
        });
        
        socket.on('new-claim', (data) => {
            if(role === 'seller' && data.sellerId === currentUser) {
                addNotification(data);
            }
        });
    </script>
</body>
</html>
